<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AsiaformS — Offline</title>
<link rel="icon" href="assets/icons/favicon.ico" />
<link rel="stylesheet" href="css/style.css" />
<style>
  .offline-wrap {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px;
  }
  .offline-icon {
    width: 88px; height: 88px; border-radius: 50%;
    background: var(--primary-tint); color: var(--primary);
    display: grid; place-items: center; font-size: 40px;
    margin-bottom: 18px;
  }
</style>
</head>
<body>
  <div class="offline-wrap">
    <div class="offline-icon">📡</div>
    <h1 style="font-size:20px; margin-bottom:8px;">You're offline</h1>
    <p class="muted" style="max-width:360px; margin-bottom:20px;">
      This page hasn't been loaded before, so it isn't available offline yet.
      Pages you've already opened (like the dashboard or a saved order) will
      still work without internet.
    </p>
    <button class="btn btn--primary" onclick="window.location.reload()">Try Again</button>
    <a href="index.html" class="btn btn--ghost" style="margin-top:10px;">Go to Dashboard</a>
  </div>
</body>
</html>
