<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AsiaformS — Order Review</title>
<link rel="icon" href="assets/logo.png" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="topbar">
    <div class="topbar__row">
      <div class="brand">
        <div class="brand__logo-badge"><img src="assets/logo.png" alt="AsiaformS" /></div>
        <div class="brand__text">
          <span class="brand__title">AsiaformS</span>
          <span class="brand__sub">Order Confirmation Message</span>
        </div>
      </div>
      <button class="icon-btn" data-toggle="dark-mode" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
    </div>
    <div class="topbar__perforation"></div>
  </header>

  <main class="app-shell" style="padding-top:20px; max-width:720px;">
    <div id="order-content">
      <!-- populated by js/order.js -->
      <div class="card text-center">
        <p class="muted">Loading order…</p>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/pdf.js"></script>
  <script src="js/order.js"></script>
</body>
</html>
